<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Mot de passe oublié - Akili</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --teal: #2dd4bf;
      --teal-dark: #0f9488;
      --bg: #0f1117;
      --card: #181b22;
      --input-bg: #1e2028;
      --text: #e8eaf0;
      --muted: #8b9099;
      --border: #2a2d35;
      --error: #f87171;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card);
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
      padding: 44px 40px 36px;
    }

    .icon-wrap {
      width: 52px;
      height: 52px;
      background: rgba(45,212,191,0.1);
      border: 1.5px solid rgba(45,212,191,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .icon-wrap svg {
      width: 24px;
      height: 24px;
      stroke: var(--teal);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 7px;
    }

    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      background: var(--input-bg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #4a4f5a; }

    input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.15);
    }

    .alert {
      display: none;
      align-items: flex-start;
      gap: 12px;
      background: rgba(45,212,191,0.08);
      border: 1.5px solid rgba(45,212,191,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13.5px;
      color: var(--teal);
      line-height: 1.55;
    }

    .alert.show { display: flex; }

    .alert svg {
      width: 18px;
      height: 18px;
      stroke: var(--teal);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px;
      background: var(--teal);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover { background: var(--teal-dark); color: #fff; }
    .btn-primary:active { transform: scale(0.99); }

    .back-link {
      text-align: center;
      font-size: 13.5px;
      color: var(--muted);
    }

    .back-link a {
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    </div>

    <div class="card-title">Mot de passe oublié ?</div>
    <p class="card-sub">Entrez votre adresse e-mail et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>

    
    <div class="alert" id="success-alert">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>Si cette adresse est associée à un compte, vous recevrez un e-mail dans quelques minutes. Pensez à vérifier vos spams.</span>
    </div>

    <div class="field">
      <label>Adresse e-mail</label>
      <input type="email" id="email" placeholder="nom@exemple.com">
    </div>

    <button class="btn-primary" onclick="handleSubmit()"> Envoyer le lien de réinitialisation</button>

    <div class="back-link">
      ← Retour à la <a href="connexion.html">connexion</a>
    </div>

  </div>

  <script>
    function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email').style.borderColor = '#f87171';
        document.getElementById('email').focus();
        return;
      }
      document.getElementById('email').style.borderColor = '';
      document.getElementById('success-alert').classList.add('show');
      document.querySelector('.btn-primary').disabled = true;
      document.querySelector('.btn-primary').style.opacity = '0.5';
      document.querySelector('.btn-primary').style.cursor = 'default';
    }
  </script>
</body>
</html>
